<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIP Pass Manager</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1 id="statusEvento">Controle de Acesso VIP</h1>
        <p>Vagas Disponíveis: <span id="vagasContador">5</span></p>
      </header>

      <main class="card">
        <div class="input-group">
          <label for="inputNome">Nome do Convidado</label>
          <input
            type="text"
            id="inputNome"
            placeholder="Ex: André Silva"
            autocomplete="off"
          />
        </div>

        <div class="button-group">
          <button id="btnEntrar" class="btn-primary">Registrar Entrada</button>
          <button id="btnReset" class="btn-secondary">Zerar Lista</button>
        </div>
      </main>

      <footer id="mensagemRodape">Aguardando registros...</footer>
    </div>
  </body>
</html>
